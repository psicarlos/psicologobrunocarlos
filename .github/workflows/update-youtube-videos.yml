name: Atualizar Shorts do YouTube

on:
  schedule:
    # Todo dia às 23:30 (horário de Brasília, UTC-3) = 02:30 UTC
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-videos:
    runs-on: ubuntu-latest
    # NÃO usar "environment: Production" aqui — secrets vazios do ambiente
    # (Vercel) sobrescrevem os do repositório e chegam vazios no runner.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verificar credenciais do YouTube
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_USERNAME: ${{ secrets.YOUTUBE_USERNAME }}
        run: |
          set -e
          if [ -z "$YOUTUBE_API_KEY" ]; then
            echo "::error::YOUTUBE_API_KEY vazio. Crie em Settings → Secrets → Actions → Repository secrets (não só Environment)"
            exit 1
          fi
          if [ "${YOUTUBE_API_KEY#AIza}" = "$YOUTUBE_API_KEY" ]; then
            echo "::warning::A chave deve começar com AIza (copie de novo do Google Cloud)"
          fi
          if [ -z "$YOUTUBE_CHANNEL_ID" ] && [ -z "$YOUTUBE_USERNAME" ]; then
            echo "::error::Defina YOUTUBE_CHANNEL_ID ou YOUTUBE_USERNAME em Repository secrets"
            exit 1
          fi
          echo "OK — API key com ${#YOUTUBE_API_KEY} caracteres"

      - name: Buscar Shorts na API do YouTube
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_USERNAME: ${{ secrets.YOUTUBE_USERNAME }}
          MAX_RESULTS: ${{ secrets.MAX_RESULTS || '4' }}
        run: node scripts/fetch-youtube-videos.js

      - name: Commit e push (dispara novo deploy na Vercel)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/assets/data/videos.json
          if git diff --staged --quiet; then
            echo "Nenhuma alteração em videos.json — sucesso sem commit"
            exit 0
          fi
          git commit -m "chore: atualizar Shorts do YouTube"
          if ! git push origin "HEAD:${GITHUB_REF_NAME}"; then
            echo "::error::git push falhou. Permita github-actions[bot] nas regras da branch main"
            exit 1
          fi
